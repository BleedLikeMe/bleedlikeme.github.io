<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Tarot Card Modal</title>\n    <style>\n        /* Modal styles */\n        .modal {\n            display: none;\n            position: fixed;\n            z-index: 1;\n            left: 0;\n            top: 0;\n            width: 100%;\n            height: 100%;\n            overflow: auto;\n            background-color: rgb(0,0,0);\n            background-color: rgba(0,0,0,0.4);\n        }\n        .modal-content {\n            background-color: #fefefe;\n            margin: 15% auto;\n            padding: 20px;\n            border: 1px solid #888;\n            width: 80%;\n        }\n        .close {\n            color: #aaa;\n            float: right;\n            font-size: 28px;\n            font-weight: bold;\n        }\n        .close:hover,\n        .close:focus {\n            color: black;\n            text-decoration: none;\n            cursor: pointer;\n        }\n    </style>\n</head>\n<body>\n    <h2>Tarot Cards</h2>\n    <button id="cardButton" onclick="showModal()">View Tarot Card</button>\n\n    <div id="myModal" class="modal">\n        <div class="modal-content">\n            <span class="close" onclick="closeModal()">&times;</span>\n            <h2>Tarot Card Name</h2>\n            <p>Description of the tarot card goes here. Detailed information about the card.</p>\n        </div>\n    </div>\n\n    <script>\n        function showModal() {\n            document.getElementById('myModal').style.display = 'block';\n        }\n\n        function closeModal() {\n            document.getElementById('myModal').style.display = 'none';\n        }\n\n        window.onclick = function(event) {\n            if (event.target == document.getElementById('myModal')) {\n                closeModal();\n            }\n        }\n    </script>\n</body>\n</html>

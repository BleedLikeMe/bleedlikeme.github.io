<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Daily Spread</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            padding: 10px;
            background-color: #f8f9fa;
        }
        h1, h2 {
            font-size: 1.5em;
        }
        button {
            padding: 10px 15px;
            font-size: 1em;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #spread {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            margin: 10px;
            padding: 15px;
            width: 90%;
            max-width: 400px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            text-align: left;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: scale(1.02);
            box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.2);
        }
        .card img {
            width: 100%;
            max-width: 200px;
            margin-top: 10px;
            border-radius: 5px;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #888;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: #000;
        }
        
        .modal-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            margin-top: 10px;
            color: #007bff;
        }
        
        .modal-description {
            font-size: 1em;
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
<body>

    <button id="drawButton">Draw Spread</button>
    <div id="spread"></div>

    <div id="cardModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeButton">&times;</span>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-description" id="modalDescription"></div>
        </div>
    </div>

        };

        const mediumshipPositions = [
            "1. Card to describe my day as a whole.",
            "2. Something important I should be mindful of today.",
            "3. What to embrace to have the best day possible."
        ];

        function drawCard(deck) {
            const index = Math.floor(Math.random() * deck.length);
            return deck.splice(index, 1)[0];
        }

        function openModal(cardName) {
            document.getElementById("modalTitle").textContent = cardName;
            document.getElementById("modalDescription").textContent = cardDescriptions[cardName] || "Description not available.";
            document.getElementById("cardModal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("cardModal").style.display = "none";
        }

        function drawSpread() {
            const deck = [...tarotDeck];
            const spreadDiv = document.getElementById("spread");
            spreadDiv.innerHTML = "<h2>Today's Reading</h2>";

            mediumshipPositions.forEach(position => {
                const card = drawCard(deck);
                const cardElement = document.createElement("div");
                cardElement.className = "card";
                cardElement.addEventListener("click", function() {
                    openModal(card);
                });
                const imgSrc = `images/${card.replace(/ /g, '_')}.jpg`;
                cardElement.innerHTML = `<strong>${position}</strong><br>Card: ${card}<br><img src="${imgSrc}" alt="${card}">`;
                spreadDiv.appendChild(cardElement);
            });
        }

        // Event listeners instead of inline onclick
        document.getElementById("drawButton").addEventListener("click", drawSpread);
        document.getElementById("closeButton").addEventListener("click", closeModal);
        
        window.addEventListener("click", function(event) {
            const modal = document.getElementById("cardModal");
            if (event.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
